name = "upsell-crosssell-app"
client_id = "YOUR_SHOPIFY_API_KEY"
application_url = "https://YOUR_APP_URL.com"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_checkouts,write_checkouts"

[auth]
redirect_urls = [
  "https://YOUR_APP_URL.com/api/auth/callback"
]

[webhooks]
api_version = "2024-01"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/api/webhooks/orders-create"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/app-uninstalled"

[pos]
embedded = false
